<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字冒險遊戲 - 進階視覺版</title>
    <style>
        :root {
            --ui-bg: rgba(20, 20, 20, 0.85);
            --text-color: #ffffff;
            --accent-color: #ffd700;
        }

        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 背景層 */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            z-index: 1;
        }

        /* 角色層 */
        #character-layer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 80vh;
            /* 角色高度佔螢幕 80% */
            z-index: 2;
            transition: opacity 0.5s, transform 0.5s;
        }

        #character-img {
            height: 100%;
            display: none;
            /* 預設隱藏 */
        }

        /* 對話框容器 */
        #ui-layer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--ui-bg);
            border-top: 2px solid var(--accent-color);
            padding: 20px 5%;
            z-index: 3;
            box-sizing: border-box;
        }

        #speaker-name {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        #text-content {
            color: var(--text-color);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            min-height: 80px;
        }

        #auto-btn {
            position: absolute;
            top: 20px;
            right: 5%;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        #auto-btn:hover, #auto-btn.active {
            background: var(--accent-color);
            color: black;
            font-weight: bold;
        }

        #options {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 4;
            width: 80%;
            max-width: 400px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent-color);
            color: white;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent-color);
            color: black;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="bg-layer"></div>

    <div id="character-layer">
        <img id="character-img" src="" alt="character">
    </div>

    <div id="ui-layer">
        <button id="auto-btn">Auto</button>
        <div id="speaker-name"></div>
        <div id="text-content"></div>
    </div>
    <div id="options"></div>

    <script>
        const bgLayer = document.getElementById('bg-layer');
        const charImg = document.getElementById('character-img');
        const nameText = document.getElementById('speaker-name');
        const mainText = document.getElementById('text-content');
        const optionsContainer = document.getElementById('options');
        const autoBtn = document.getElementById('auto-btn');

        let state = {};
        let currentNextText = null;
        let isAuto = false;
        let autoTimer = null;

        autoBtn.onclick = (e) => {
            e.stopPropagation();
            isAuto = !isAuto;
            autoBtn.classList.toggle('active', isAuto);
            if (isAuto && currentNextText !== null) {
                tryAutoNext();
            } else {
                clearTimeout(autoTimer);
            }
        };

        function tryAutoNext() {
            clearTimeout(autoTimer);
            autoTimer = setTimeout(() => {
                if (isAuto && currentNextText !== null) {
                    showNode(currentNextText);
                }
            }, 1500);
        }

        // 處理點擊任意處進入下一句（當沒有選項時）
        document.addEventListener('click', (e) => {
            if (currentNextText !== null && !e.target.closest('.btn')) {
                if (isAuto) {
                    isAuto = false;
                    autoBtn.classList.remove('active');
                    clearTimeout(autoTimer);
                }
                showNode(currentNextText);
            }
        });

        const textNodes = [
            {
                id: 1,
                speaker: "???",
                text: "你在森林中醒來，太陽刺得你睜不開眼。",
                image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200", // 森林背景
                character: "", // 空字串代表沒有角色
                options: [
                    { text: "大喊有人嗎？", nextText: 2 },
                    { text: "往深處走去", nextText: 3 }
                ]
            },
            {
                id: 2,
                speaker: "神秘少女",
                text: "「小聲一點！你想把那些傢伙引過來嗎？」一位少女突然從樹後走出來。",
                image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200",
                character: "角色1.png", // 角色圖片 (PNG 透明圖佳)
                options: [
                    { text: "你是誰？", nextText: 4 },
                    { text: "對不起...（臉紅）", nextText: 4 }
                ]
            },
            {
                id: 3,
                speaker: "系統",
                text: "森林深處霧氣太濃，你迷路了。遊戲結束。",
                image: "https://images.unsplash.com/photo-1501854140801-50d01674af3e?w=1200",
                character: "",
                options: [
                    { text: "重新開始", nextText: 1 }
                ]
            },
            {
                id: 4,
                speaker: "神秘少女",
                text: "「沒時間解釋了，拿著這把劍跟我走。」",
                image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1200",
                character: "https://cdn.pixabay.com/photo/2014/04/02/10/44/anime-304443_1280.png",
                nextText: 1 // 沒有選項時，使用 nextText 指定下一句
            }
        ];

        function showNode(nodeId) {
            const node = textNodes.find(n => n.id === nodeId);

            // 更新文字與姓名
            nameText.innerText = node.speaker;
            mainText.innerText = node.text;

            // 更新背景
            if (node.image) {
                bgLayer.style.backgroundImage = `url('${node.image}')`;
            }

            // 更新角色
            if (node.character) {
                charImg.src = node.character;
                charImg.style.display = 'block';
                charImg.style.opacity = '1';
            } else {
                charImg.style.opacity = '0';
                setTimeout(() => { if (charImg.style.opacity === '0') charImg.style.display = 'none'; }, 500);
            }

            // 更新按鈕
            optionsContainer.innerHTML = '';
            currentNextText = null;

            if (node.options && node.options.length > 0) {
                node.options.forEach(opt => {
                    const button = document.createElement('button');
                    button.innerText = opt.text;
                    button.classList.add('btn');
                    button.onclick = (e) => {
                        e.stopPropagation(); // 避免點擊按鈕時觸發背景點擊
                        showNode(opt.nextText);
                    };
                    optionsContainer.appendChild(button);
                });
                clearTimeout(autoTimer); // 有選項時暫停自動播放
            } else if (node.nextText) {
                // 若沒有選項，但有設定 nextText，則允許點擊畫面繼續
                currentNextText = node.nextText;
                if (isAuto) {
                    tryAutoNext();
                }
            }
        }

        // 啟動遊戲
        showNode(1);
    </script>
</body>

</html>
